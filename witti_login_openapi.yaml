  # ============================================================
  # 학습 이력 등록
  # ============================================================
  /ias/school:
    post:
      tags:
        - 학습 이력 등록
      summary: "위티스쿨 > 아람"
      description: |
        아람 학습 이력을 등록합니다.
        - 일반 학습 이력: 기본 필드만 전송
        - 포트폴리오 학습 이력: portfolio 배열을 추가로 포함하여 전송 (예: itemCd=AR0000011)
      operationId: iasSchool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prodId
                - itemCd
                - curtniSeq
                - stdLtm
                - stdScore
                - stdTp
              properties:
                prodId:
                  type: string
                  example: "PI-00000000000000001"
                itemCd:
                  type: string
                  example: "AR0000007"
                curtniSeq:
                  type: integer
                  example: 1926
                stdLtm:
                  type: number
                  example: 50
                stdScore:
                  type: integer
                  example: 0
                stdTp:
                  type: string
                  example: "STD"
                portfolio:
                  type: array
                  description: "포트폴리오 학습 이력 시 포함 (예: itemCd=AR0000011)"
                  items:
                    type: object
                    properties:
                      fileId:
                        type: string
                        example: "FS-250717P8751717989"
                      fileTp:
                        type: string
                        example: "image"
                      audioUrl:
                        type: string
                        nullable: true
                      imgUrl:
                        type: string
                        nullable: true
                      idx:
                        type: integer
                        example: 1
      responses:
        "200":
          description: 아람 학습 이력 등록 성공
          content:
            application/json:
              schema:
                type: object

