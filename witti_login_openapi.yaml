  /report/teacherReport:
    post:
      tags:
        - 위티박스(런처)
      summary: "학습 리포트 > 선생님 (주간/월간)"
      description: |
        선생님 학습 리포트를 조회합니다.
        - 주간 리포트: reportType을 "WEEK"으로 설정하고, week 파라미터를 포함합니다. parentTp에 "T"를 설정합니다.
        - 월간 리포트: reportType을 "MONTH"로 설정하고, week 파라미터를 생략합니다. parentTp를 생략할 수 있습니다.
      operationId: teacherReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                curriculumTp:
                  type: integer
                  example: 0
                childAge:
                  type: integer
                  example: 5
                childId:
                  type: string
                year:
                  type: integer
                  example: 2026
                month:
                  type: integer
                  example: 2
                week:
                  type: integer
                  description: "주간 리포트 시 사용 (월간 리포트에서는 생략)"
                  example: 52
                reportType:
                  type: string
                  enum: [WEEK, MONTH]
                  example: "WEEK"
                parentTp:
                  type: string
                  description: "주간 리포트 시 'T' 설정 (월간 리포트에서는 생략 가능)"
                  example: "T"
      responses:
        "200":
          description: 선생님 리포트 조회 성공
          content:
            application/json:
              schema:
                type: object

