openapi: 3.0.3
info:
  title: "위티버스 BtoB API 문서 - 내부 테스트용"
  description: "위티버스 BtoB 통합 API 문서"
  version: "1.0.0"

servers:
  - url: https://api.wittiverse.com/v2
    description: Production
  - url: https://qa-api.wittiverse.com/v2
    description: QA
  - url: https://dev-api.wittiverse.com/v2
    description: Dev

tags:
  - name: 인증 (로그인/토큰)
    description: 로그인 및 토큰 관련 API
  - name: 클래스 선택
    description: 클래스 목록 및 학습 시작 관련 API
  - name: 위티스쿨
    description: 위티스쿨 관련 API
  - name: 위티TV
    description: 위티TV 관련 API
  - name: 위티플레이
    description: 위티플레이 (미니게임) 관련 API
  - name: 위티박스(런처)
    description: 위티박스 런처, 커리큘럼, 리포트, 미션 관련 API
  - name: 위티App
    description: 위티App 캐릭터, 미션, 출석, 상점, 퀴즈 등 관련 API
  - name: 공통
    description: 공통 API
  - name: 학습 이력 등록
    description: 학습 이력 등록 (IAS) API

paths:
  # ============================================================
  # 인증 (로그인/토큰)
  # ============================================================
  /authenticate/login:
    post:
      tags:
        - 인증 (로그인/토큰)
      summary: 통합 로그인
      operationId: login
      security:
        - XDeviceInfo: []
      parameters:
        - name: loginTp
          in: query
          required: true
          description: "로그인 타입"
          schema:
            type: string
            enum: [L, P, T, B]
            example: L
        - name: ptnrId
          in: query
          required: true
          description: "파트너 ID"
          schema:
            type: string
            example: "1102"
        - name: autoLoginYn
          in: query
          required: false
          description: "자동 로그인 여부"
          schema:
            type: string
            enum: [Y, N]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - loginId
                - loginPwd
              properties:
                loginId:
                  type: string
                  description: "로그인 ID (평문 입력 시 자동 Base64 인코딩)"
                  example: "MGtest000"
                loginPwd:
                  type: string
                  description: "비밀번호 (평문 입력 시 자동 Base64 인코딩)"
                  example: "mini1122@@"
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      authToken:
                        type: string
                      refreshToken:
                        type: string
                      childList:
                        type: array
                        items:
                          type: object
                          properties:
                            childId:
                              type: string
                            childAge:
                              type: integer

  /authenticate/token/issue:
    get:
      tags:
        - 인증 (로그인/토큰)
      summary: 토큰 갱신
      operationId: tokenIssue
      parameters:
        - name: childId
          in: query
          required: false
          description: "자녀 ID"
          schema:
            type: string
      responses:
        "200":
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      authToken:
                        type: string

  # ============================================================
  # 클래스 선택
  # ============================================================
  /authenticate/classes/{id}:
    get:
      tags:
        - 클래스 선택
      summary: 클래스 목록
      operationId: getClasses
      parameters:
        - name: id
          in: path
          required: true
          description: "로그인 ID"
          schema:
            type: string
            example: "MGtest000"
      responses:
        "200":
          description: 클래스 목록 조회 성공
          content:
            application/json:
              schema:
                type: object

  /authenticate/classes:
    get:
      tags:
        - 클래스 선택
      summary: 클래스 내 학생 목록
      operationId: getClassStudents
      parameters:
        - name: classId
          in: query
          required: true
          description: "클래스 ID"
          schema:
            type: string
            example: "C000000143"
      responses:
        "200":
          description: 학생 목록 조회 성공
          content:
            application/json:
              schema:
                type: object

  /authenticate/study/access:
    post:
      tags:
        - 클래스 선택
      summary: 학습 시작
      operationId: studyAccess
      security:
        - XDeviceInfo: []
      parameters:
        - name: loginTp
          in: query
          required: true
          schema:
            type: string
            example: L
        - name: autoLoginYn
          in: query
          required: true
          schema:
            type: string
            example: Y
        - name: ptnrId
          in: query
          required: true
          schema:
            type: string
            example: "1000"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                studentId:
                  type: string
                  example: "S000000818"
                loginId:
                  type: string
                accessType:
                  type: string
                  example: "C"
      responses:
        "200":
          description: 학습 시작 성공
          content:
            application/json:
              schema:
                type: object

  # ============================================================
  # 위티스쿨
  # ============================================================
  /witti-school/start-study:
    post:
      tags:
        - 위티스쿨
      summary: 학습 시작
      operationId: wittiSchoolStartStudy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prodId:
                  type: string
                  example: "PI-00000000000000001"
                startDate:
                  type: string
                  example: "2025-04-15"
      responses:
        "200":
          description: 학습 시작 성공
          content:
            application/json:
              schema:
                type: object

  /witti-school/reset-study:
    post:
      tags:
        - 위티스쿨
      summary: 학습 초기화
      operationId: wittiSchoolResetStudy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prodId:
                  type: string
                  example: "PI-00000000000000001"
      responses:
        "200":
          description: 학습 초기화 성공
          content:
            application/json:
              schema:
                type: object

  /witti-school/verify:
    get:
      tags:
        - 위티스쿨
      summary: 최초접속 확인
      operationId: wittiSchoolVerify
      responses:
        "200":
          description: 최초접속 확인 성공
          content:
            application/json:
              schema:
                type: object

  /witti-school/brand:
    get:
      tags:
        - 위티스쿨
      summary: 브랜드 확인
      operationId: wittiSchoolBrand
      responses:
        "200":
          description: 브랜드 확인 성공
          content:
            application/json:
              schema:
                type: object

  /witti-school/main:
    get:
      tags:
        - 위티스쿨
      summary: 메인 화면
      operationId: wittiSchoolMain
      responses:
        "200":
          description: 메인 화면 조회 성공
          content:
            application/json:
              schema:
                type: object

  /witti-school/aram-bookworld/main:
    get:
      tags:
        - 위티스쿨
      summary: 아람북월드 메인
      operationId: aramBookworldMain
      parameters:
        - name: ptnrId
          in: query
          required: true
          schema:
            type: string
            example: "1102"
        - name: prodId
          in: query
          required: true
          schema:
            type: string
            example: "PI-00000000000000001"
        - name: itemCd
          in: query
          required: false
          schema:
            type: string
            example: "AR0000010"
        - name: tmlnDt
          in: query
          required: false
          schema:
            type: string
            example: "2025-06-26"
      responses:
        "200":
          description: 아람북월드 메인 조회 성공
          content:
            application/json:
              schema:
                type: object

  /witti-school/aram-bookworld/subject:
    get:
      tags:
        - 위티스쿨
      summary: 아람북월드 과목
      operationId: aramBookworldSubject
      parameters:
        - name: ptnrId
          in: query
          required: true
          schema:
            type: string
            example: "1102"
        - name: prodId
          in: query
          required: true
          schema:
            type: string
            example: "PI-00000000000000001"
      responses:
        "200":
          description: 아람북월드 과목 조회 성공
          content:
            application/json:
              schema:
                type: object

  /witti-school/aram-bookworld/subject/{subjCd}:
    get:
      tags:
        - 위티스쿨
      summary: 아람북월드 과목 상세
      operationId: aramBookworldSubjectDetail
      parameters:
        - name: subjCd
          in: path
          required: true
          description: "과목 코드"
          schema:
            type: string
        - name: ptnrId
          in: query
          required: true
          schema:
            type: string
            example: "1102"
        - name: prodId
          in: query
          required: true
          schema:
            type: string
            example: "PI-00000000000000001"
        - name: itemCd
          in: query
          required: false
          schema:
            type: string
        - name: pageNo
          in: query
          required: false
          schema:
            type: integer
        - name: pageRow
          in: query
          required: false
          schema:
            type: integer
        - name: curtnSeq
          in: query
          required: false
          schema:
            type: integer
            example: 4
      responses:
        "200":
          description: 아람북월드 과목 상세 조회 성공
          content:
            application/json:
              schema:
                type: object

  /witti-school/e-book/main:
    get:
      tags:
        - 위티스쿨
      summary: 도서관 메인 화면
      operationId: ebookMain
      responses:
        "200":
          description: 도서관 메인 화면 조회 성공
          content:
            application/json:
              schema:
                type: object

  /witti-school/e-book/main/book/list/catgry:
    get:
      tags:
        - 위티스쿨
      summary: 도서관 책 리스트 조회
      operationId: ebookListByCatgry
      parameters:
        - name: pageNo
          in: query
          required: false
          schema:
            type: integer
            example: 1
        - name: pageRow
          in: query
          required: false
          schema:
            type: integer
            example: 999
        - name: catgryCd
          in: query
          required: true
          description: "카테고리 코드"
          schema:
            type: string
      responses:
        "200":
          description: 도서관 책 리스트 조회 성공
          content:
            application/json:
              schema:
                type: object

  # ============================================================
  # 위티TV
  # ============================================================
  /tv/verify:
    get:
      tags:
        - 위티TV
      summary: 최초접속 확인
      operationId: tvVerify
      responses:
        "200":
          description: 최초접속 확인 성공
          content:
            application/json:
              schema:
                type: object

  /tv/category:
    get:
      tags:
        - 위티TV
      summary: 카테고리 리스트
      operationId: tvCategory
      parameters:
        - name: catgryCd
          in: query
          required: true
          description: "카테고리 코드"
          schema:
            type: string
            enum: [L3000, L3001, L3002, L3004]
      responses:
        "200":
          description: 카테고리 리스트 조회 성공
          content:
            application/json:
              schema:
                type: object

  /tv/main:
    get:
      tags:
        - 위티TV
      summary: 메인 화면
      operationId: tvMain
      responses:
        "200":
          description: 메인 화면 조회 성공
          content:
            application/json:
              schema:
                type: object

  /tv/main/{catgryCd}:
    get:
      tags:
        - 위티TV
      summary: 메인 (카테고리)
      operationId: tvMainCategory
      parameters:
        - name: catgryCd
          in: path
          required: true
          description: "카테고리 코드"
          schema:
            type: string
        - name: subCatgryCd
          in: query
          required: false
          description: "하위 카테고리 코드"
          schema:
            type: string
      responses:
        "200":
          description: 메인 (카테고리) 조회 성공
          content:
            application/json:
              schema:
                type: object

  /tv/category/detail:
    get:
      tags:
        - 위티TV
      summary: 카테고리 별 상세
      operationId: tvCategoryDetail
      parameters:
        - name: catgryCd
          in: query
          required: true
          description: "카테고리 코드"
          schema:
            type: string
        - name: searchTp
          in: query
          required: false
          description: "검색 타입"
          schema:
            type: string
            enum: [unwatched, watched, new, popular]
      responses:
        "200":
          description: 카테고리 별 상세 조회 성공
          content:
            application/json:
              schema:
                type: object

  /tv/category/detail/newPop:
    get:
      tags:
        - 위티TV
      summary: 신작/인기 카테고리 별 상세
      operationId: tvCategoryDetailNewPop
      parameters:
        - name: topCatgryCd
          in: query
          required: true
          schema:
            type: string
        - name: upCatgryCd
          in: query
          required: true
          schema:
            type: string
        - name: newPopTp
          in: query
          required: true
          schema:
            type: string
        - name: searchTp
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 신작/인기 카테고리 별 상세 조회 성공
          content:
            application/json:
              schema:
                type: object

  /tv/favorites:
    get:
      tags:
        - 위티TV
      summary: 즐겨찾기 리스트 조회
      operationId: tvFavoritesList
      parameters:
        - name: topCatgryCd
          in: query
          required: true
          schema:
            type: string
        - name: upCatgryCd
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 즐겨찾기 리스트 조회 성공
          content:
            application/json:
              schema:
                type: object
    post:
      tags:
        - 위티TV
      summary: 즐겨찾기 등록/해제
      operationId: tvFavoritesToggle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contsId:
                  type: string
                  example: "CB-240404P4720782772"
                favoritesYn:
                  type: string
                  enum: [Y, N]
                  example: "N"
      responses:
        "200":
          description: 즐겨찾기 등록/해제 성공
          content:
            application/json:
              schema:
                type: object

  /tv/recommend:
    get:
      tags:
        - 위티TV
      summary: 플레이어 다음 컨텐츠 추천
      operationId: tvRecommend
      parameters:
        - name: catgryCd
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 다음 컨텐츠 추천 조회 성공
          content:
            application/json:
              schema:
                type: object

  /tv/e-board:
    get:
      tags:
        - 위티TV
      summary: 전광판 조회
      operationId: tvEBoard
      responses:
        "200":
          description: 전광판 조회 성공
          content:
            application/json:
              schema:
                type: object

  # ============================================================
  # 위티플레이
  # ============================================================
  /witti-play/game/main:
    get:
      tags:
        - 위티플레이
      summary: 미니 게임 보유 위티팡 조회
      operationId: wittiPlayGameMain
      parameters:
        - name: contsId
          in: query
          required: true
          description: "콘텐츠 ID"
          schema:
            type: string
            example: "CB-240129000000G0001"
      responses:
        "200":
          description: 보유 위티팡 조회 성공
          content:
            application/json:
              schema:
                type: object

  /witti-play/game/score:
    get:
      tags:
        - 위티플레이
      summary: 미니 게임 점수 조회
      operationId: wittiPlayGameScoreGet
      parameters:
        - name: contsId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 미니 게임 점수 조회 성공
          content:
            application/json:
              schema:
                type: object
    post:
      tags:
        - 위티플레이
      summary: 미니 게임 점수 저장
      operationId: wittiPlayGameScoreSave
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contsId:
                  type: string
                  example: "CB-240129000000G0001"
                gameScore:
                  type: string
                  example: "77777"
                gameHistSeq:
                  type: string
                  example: "1"
      responses:
        "200":
          description: 미니 게임 점수 저장 성공
          content:
            application/json:
              schema:
                type: object

  /witti-play/game/ranked:
    get:
      tags:
        - 위티플레이
      summary: 미니 게임 랭킹 리스트 조회
      operationId: wittiPlayGameRanked
      parameters:
        - name: contsId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 미니 게임 랭킹 리스트 조회 성공
          content:
            application/json:
              schema:
                type: object

  /witti-play/game/init:
    post:
      tags:
        - 위티플레이
      summary: 미니 게임 초기화
      operationId: wittiPlayGameInit
      responses:
        "200":
          description: 미니 게임 초기화 성공
          content:
            application/json:
              schema:
                type: object

  # ============================================================
  # 위티박스(런처)
  # ============================================================
  /config/apps/list:
    get:
      tags:
        - 위티박스(런처)
      summary: 런처 앱 리스트
      operationId: configAppsList
      security:
        - XDeviceInfo: []
      parameters:
        - name: ptnrId
          in: query
          required: true
          schema:
            type: string
            example: "1102"
        - name: managedYn
          in: query
          required: true
          description: "관리 여부"
          schema:
            type: string
            enum: [N, B]
      responses:
        "200":
          description: 런처 앱 리스트 조회 성공
          content:
            application/json:
              schema:
                type: object

  /witti-box/curriculum:
    get:
      tags:
        - 위티박스(런처)
      summary: 커리큘럼 조회
      operationId: wittiBoxCurriculum
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 커리큘럼 조회 성공
          content:
            application/json:
              schema:
                type: object

  /witti-app/attendance/curriculum:
    post:
      tags:
        - 위티박스(런처)
      summary: 출석 시간 전송
      operationId: attendanceCurriculum
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isMidNight:
                  type: string
                  example: "false"
      responses:
        "200":
          description: 출석 시간 전송 성공
          content:
            application/json:
              schema:
                type: object

  /report/parentReport:
    post:
      tags:
        - 위티박스(런처)
      summary: 학습 리포트 > 부모(학생) / 주간
      operationId: parentReport
