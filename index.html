<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>위티버스 API 문서</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    #auth-status {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      background: #e3f2fd;
      color: #1565c0;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 12px;
      border: 1px solid #90caf9;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      max-width: 280px;
      word-break: break-all;
      line-height: 1.6;
    }
    #auth-status b { color: #0d47a1; }
    .swagger-ui .info .main .url { display: none; }
    .swagger-ui .auth-wrapper .authorize { display: none; }
    .swagger-ui .authorization__btn { display: none; }
    .swagger-ui .parameter__enum { display: none; }
  </style>
</head>
<body>
  <div id="auth-status"></div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    // 파라미터별 enum-description 매핑 (paramName -> { value: description })
    var paramEnumDescs = {};

    const ui = SwaggerUIBundle({
      url: "witti_login_openapi.yaml",
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis],
      layout: "BaseLayout",

      // X-device-info 기본값 설정
      onComplete: function () {
        ui.preauthorizeApiKey(
          "XDeviceInfo",
          "QW5kcm9pZC4zMzo6OlI5VFgyMDJHNUFFTTo6OlI5VFgyMDJHNUFFTTo6OktOT1g6OjpTTS1YMjE2Ojo6YXBwLjE0Ojo6"
        );

        // spec 객체에서 x-enum-descriptions 추출
        try {
          var spec = ui.specSelectors.specJson().toJS();
          var paths = spec.paths || {};
          Object.keys(paths).forEach(function(path) {
            var methods = paths[path];
            Object.keys(methods).forEach(function(method) {
              var op = methods[method];
              if (!op || !op.parameters) return;
              op.parameters.forEach(function(param) {
                var descs = param["x-enum-descriptions"];
                var enums = param.schema && param.schema.enum;
                if (descs && enums && enums.length === descs.length) {
                  for (var i = 0; i < enums.length; i++) {
                    var key = String(enums[i]);
                    if (key !== "" && descs[i] !== "") {
                      if (!paramEnumDescs[key]) paramEnumDescs[key] = descs[i];
                    }
                  }
                }
              });
            });
          });
          console.log("[enum-desc] loaded", Object.keys(paramEnumDescs).length, "entries:", paramEnumDescs);
        } catch(e) {
          console.error("[enum-desc] spec parse error:", e);
        }
      },

      // 로그인/학습시작 응답에서 authToken 자동 저장 + 갱신
      responseInterceptor: function (response) {
        try {
          var data = response.obj || response.body;
          if (typeof data === "string") data = JSON.parse(data);
          if (!data && response.text) data = JSON.parse(response.text);

          if (data && data.result && data.result.authToken) {
            var token = data.result.authToken;
            var loginId = data.result.loginId || window._savedLoginId || "";
            var memId = data.result.memId || "";

            window._savedAuthToken = token;
            if (data.result.refreshToken) window._savedRefreshToken = data.result.refreshToken;
            if (loginId) window._savedLoginId = loginId;

            var status = document.getElementById("auth-status");
            var html = "<b>loginId:</b> " + (window._savedLoginId || "-");
            if (memId) html += "<br><b>memId:</b> " + memId;
            html += "<br><b>authToken:</b> " + token;
            status.innerHTML = html;
            status.style.display = "block";
          }
        } catch (e) {
          console.log("responseInterceptor error:", e);
        }
        return response;
      },

      // X-device-info fallback + authToken 자동 추가 + Base64 인코딩
      requestInterceptor: function (request) {
        if (!request.headers["X-device-info"]) {
          request.headers["X-device-info"] =
            "QW5kcm9pZC4zMzo6OlI5VFgyMDJHNUFFTTo6OlI5VFgyMDJHNUFFTTo6OktOT1g6OjpTTS1YMjE2Ojo6YXBwLjE0Ojo6";
        }
        if (request.url.indexOf("/authenticate/token") !== -1 && window._savedRefreshToken) {
          request.headers["Authorization"] = "Bearer " + window._savedRefreshToken;
        } else if (window._savedAuthToken) {
          request.headers["Authorization"] = "Bearer " + window._savedAuthToken;
        }
        if (request.body && request.url.indexOf("/authenticate/login") !== -1) {
          try {
            var body = typeof request.body === "string" ? JSON.parse(request.body) : request.body;
            if (body.loginId) {
              window._savedLoginId = body.loginId;
              body.loginId = btoa(unescape(encodeURIComponent(body.loginId)));
            }
            if (body.loginPwd) body.loginPwd = btoa(unescape(encodeURIComponent(body.loginPwd)));
            request.body = JSON.stringify(body);
          } catch (e) {}
        }
        return request;
      }
    });

    // 드롭다운 옵션에 enum description 표시
    function patchDropdowns() {
      document.querySelectorAll(".swagger-ui select").forEach(function(sel) {
        sel.querySelectorAll("option").forEach(function(opt) {
          var val = opt.value;
          var desc = paramEnumDescs[val];
          if (desc && opt.textContent.indexOf("(") === -1) {
            opt.textContent = val + " (" + desc + ")";
          }
        });
      });
    }

    new MutationObserver(function() {
      setTimeout(patchDropdowns, 100);
    }).observe(document.getElementById("swagger-ui"), { childList: true, subtree: true });

    // 드롭다운에서 빈값 선택 시 Send empty value 체크박스 자동 체크/해제
    document.addEventListener('change', function(e) {
      if (e.target.tagName === 'SELECT') {
        var row = e.target.closest('tr') || e.target.closest('.parameter');
        if (!row) return;
        var cb = row.querySelector('input[type="checkbox"]');
        if (cb && !cb.disabled) {
          var isEmpty = e.target.value === '';
          var isChecked = cb.checked;
          if (isEmpty && !isChecked) {
            cb.click();
          } else if (!isEmpty && isChecked) {
            cb.click();
          }
        }
      }
    });
  </script>
</body>
</html>
