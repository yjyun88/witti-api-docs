<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>위티 API 문서</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    #auto-auth-banner {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      border: 1px solid #a5d6a7;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      max-width: 350px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="auto-auth-banner"></div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    const ui = SwaggerUIBundle({
      url: "witti_login_openapi.yaml",
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis],
      layout: "BaseLayout",

      // X-device-info 기본값 설정
      onComplete: function () {
        ui.preauthorizeApiKey(
          "XDeviceInfo",
          "QW5kcm9pZC4zMzo6OlI5VFgyMDJHNUFFTTo6OlI5VFgyMDJHNUFFTTo6OktOT1g6OjpTTS1YMjE2Ojo6YXBwLjE0Ojo6"
        );
      },

      // 로그인 응답에서 authToken 자동 저장
      responseInterceptor: function (response) {
        try {
          var data = response.obj || response.body;
          if (typeof data === "string") data = JSON.parse(data);
          if (!data && response.text) data = JSON.parse(response.text);

          if (data && data.result && data.result.authToken) {
            var token = data.result.authToken;
            var loginId = data.result.loginId || "";
            window._savedAuthToken = token;

            var banner = document.getElementById("auto-auth-banner");
            banner.innerHTML = "<b>loginId:</b> " + loginId + "<br><b>authToken:</b> " + token;
            banner.style.display = "block";
          }
        } catch (e) {
          console.log("responseInterceptor error:", e);
        }
        return response;
      },

      // X-device-info + authToken 자동 추가 + Base64 인코딩
      requestInterceptor: function (request) {
        if (!request.headers["X-device-info"]) {
          request.headers["X-device-info"] =
            "QW5kcm9pZC4zMzo6OlI5VFgyMDJHNUFFTTo6OlI5VFgyMDJHNUFFTTo6OktOT1g6OjpTTS1YMjE2Ojo6YXBwLjE0Ojo6";
        }
        var savedToken = window._savedAuthToken;
        if (savedToken && !request.headers["Authorization"]) {
          request.headers["Authorization"] = "Bearer " + savedToken;
        }

        if (request.body && request.url.indexOf("/authenticate/login") !== -1) {
          try {
            var body = typeof request.body === "string" ? JSON.parse(request.body) : request.body;
            if (body.loginId) body.loginId = btoa(unescape(encodeURIComponent(body.loginId)));
            if (body.loginPwd) body.loginPwd = btoa(unescape(encodeURIComponent(body.loginPwd)));
            request.body = JSON.stringify(body);
          } catch (e) {}
        }
        return request;
      }
    });
  </script>
</body>
</html>
