<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>위티 API 문서</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    #auto-auth-banner {
      display: none;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 10px 16px;
      margin: 10px 50px;
      border-radius: 6px;
      font-size: 14px;
      border: 1px solid #a5d6a7;
    }
  </style>
</head>
<body>
  <div id="auto-auth-banner"></div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    const ui = SwaggerUIBundle({
      url: "witti_login_openapi.yaml",
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis],
      layout: "BaseLayout",

      // X-device-info 기본값 설정
      onComplete: function () {
        ui.preauthorizeApiKey(
          "XDeviceInfo",
          "QW5kcm9pZC4zMzo6OlI5VFgyMDJHNUFFTTo6OlI5VFgyMDJHNUFFTTo6OktOT1g6OjpTTS1YMjE2Ojo6YXBwLjE0Ojo6"
        );
      },

      // 로그인 응답에서 authToken 자동 저장
      responseInterceptor: function (response) {
        try {
          var data = typeof response.body === "string"
            ? JSON.parse(response.body)
            : response.body;

          if (data && data.result && data.result.authToken) {
            var token = data.result.authToken;
            ui.preauthorizeSecurityDefinition("BearerAuth", { scheme: "bearer", value: token });
            window._savedAuthToken = token;

            var banner = document.getElementById("auto-auth-banner");
            banner.textContent = "authToken 자동 저장 완료: " + token.substring(0, 20) + "...";
            banner.style.display = "block";
            setTimeout(function () { banner.style.display = "none"; }, 5000);
          }
        } catch (e) {
          // ignore parse errors
        }
        return response;
      },

      // 모든 요청에 X-device-info 헤더 자동 추가 + loginId/loginPwd Base64 자동 인코딩
      requestInterceptor: function (request) {
        if (!request.headers["X-device-info"]) {
          request.headers["X-device-info"] =
            "QW5kcm9pZC4zMzo6OlI5VFgyMDJHNUFFTTo6OlI5VFgyMDJHNUFFTTo6OktOT1g6OjpTTS1YMjE2Ojo6YXBwLjE0Ojo6";
        }
        // 저장된 authToken이 있고 Authorization 헤더가 없으면 자동 추가
        if (window._savedAuthToken && !request.headers["Authorization"]) {
          request.headers["Authorization"] = "Bearer " + window._savedAuthToken;
        }
        // loginId, loginPwd 평문 → Base64 자동 변환
        if (request.body && request.url.indexOf("/authenticate/login") !== -1) {
          try {
            var body = typeof request.body === "string" ? JSON.parse(request.body) : request.body;
            if (body.loginId) body.loginId = btoa(unescape(encodeURIComponent(body.loginId)));
            if (body.loginPwd) body.loginPwd = btoa(unescape(encodeURIComponent(body.loginPwd)));
            request.body = JSON.stringify(body);
          } catch (e) {}
        }
        return request;
      }
    });
  </script>
</body>
</html>
